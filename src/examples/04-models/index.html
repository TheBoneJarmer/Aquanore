<!DOCTYPE html>
<html>

<head>
    <title>Models</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,height=device-height,initial-scale=1.0" />

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;

            font-family: Verdana, Geneva, Tahoma, sans-serif;
            font-size: 24pt;
            color: #fff;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        #info {
            display: block;
            width: 100%;
            padding: 32px;

            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;

            text-align: center;
            text-transform: uppercase;
        }

        #info .arrow {
            color: green;
            padding: 0 16px;
        }

        #info .arrow.disabled {
            color: #333;
        }
    </style>
</head>

<body>
    <div id="info">Test</div>
    <script src="game.ts" type="module"></script>
</body>

</html>
