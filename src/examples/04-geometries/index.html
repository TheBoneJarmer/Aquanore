<!DOCTYPE html>
<html>

<head>
    <title>Geometries</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,height=device-height,initial-scale=1.0" />

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;

            font-family: Verdana, Geneva, Tahoma, sans-serif;
            font-size: 24pt;
            color: #fff;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        #info {
            display: block;
            width: 100%;
            padding: 32px;

            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;

            text-align: center;
            text-transform: uppercase;
        }

        #info span {
            user-select: none;
        }

        #title {
            display: inline-block;
            width: 192px;
        }

        #info .arrow {
            color: green;
            padding: 0 16px;
            cursor: pointer;
        }

        #info .arrow:hover {
            color: #fff;
        }

        #info .arrow.disabled {
            color: #333;
            cursor: default;
        }
    </style>
</head>

<body>
    <div id="info">
        <span id="arrow-left" class="arrow">&#129032;</span>
        <span id="title">Test</span>
        <span id="arrow-right" class="arrow">&#129034;</span>
    </div>
    <script src="game.js" type="module"></script>
</body>

</html>
