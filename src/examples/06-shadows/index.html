<!DOCTYPE html>
<html>

<head>
    <title>Shadows</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,height=device-height,initial-scale=1.0" />

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        #info {
            display: flex;
            flex-direction: column;
            position: absolute;
            left: 0;
            top: 0;
            width: 320px;
            height: auto;
            padding: 16px;

            z-index: 1;
            color: #fff;
            background-color: #222;
            opacity: 0.8;
            font-size: 12pt;
            font-family: Verdana, Geneva, Tahoma, sans-serif;
        }

        #info span {
            flex: 1;
            padding: 0 0 8px 0;
        }

        #info span:last-child {
            padding: 0px;
        }

        #info b {
            display: inline-block;
            flex: 1;
            width: 96px;
        }
    </style>
</head>
<div id="info"></div>
<script src="game.js" type="module"></script>
</body>

</html>
